name: Java Tests

on:
  push:
    paths:
      - 'Java/**'
  pull_request:
    paths:
      - 'Java/**'

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [Task_1, Task_2, Task_3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Run tests
        run: ./gradlew test
        working-directory: Java/${{ matrix.task }}
